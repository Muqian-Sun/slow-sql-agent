services:
  mysql:
    image: mysql:8.0
    container_name: slowsql-mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --sql-mode=STRICT_TRANS_TABLES,NO_ZERO_DATE,NO_ZERO_IN_DATE,ERROR_FOR_DIVISION_BY_ZERO
      # 给百万级灌数用的内存/日志预算; 同时降低耐久性配置以加速 bulk insert(本地评测环境, 非线上)
      - --innodb-buffer-pool-size=1G
      - --innodb-redo-log-capacity=536870912
      - --innodb-flush-log-at-trx-commit=2
      - --sync-binlog=0
      - --skip-log-bin
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: slow_sql_agent
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./samples/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql-data:
